appId: com.moment.todo
productName: Moment
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - assets/**/*
win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
extraResources:
  - from: assets/
    to: assets/
