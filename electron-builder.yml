icon: public/icon.ico
appId: com.moment.todo
productName: Moment
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - assets/**/*
win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
extraResources:
  - from: assets/
    to: assets/
  - from: public/
    to: public/
    filter:
      - icon-32.png
      - icon.png
